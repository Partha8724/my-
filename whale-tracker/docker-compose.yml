services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: whalescope
    ports: ['5432:5432']
    volumes: [db_data:/var/lib/postgresql/data]

  redis:
    image: redis:7
    ports: ['6379:6379']

  backend:
    build: ./backend
    env_file: .env
    depends_on: [db, redis]
    ports: ['8000:8000']

  worker:
    build: ./backend
    env_file: .env
    depends_on: [redis, backend]
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on: [backend]
    ports: ['3000:3000']

volumes:
  db_data:
