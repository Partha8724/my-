services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: whalescope
      POSTGRES_PASSWORD: whalescope
      POSTGRES_DB: whalescope
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whalescope -d whalescope"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    env_file: .env
    ports: ["8000:8000"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build: ./backend
    env_file: .env
    command: celery -A app.workers.celery_app.celery worker --loglevel=info
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build: ./frontend
    env_file: .env
    ports: ["3000:3000"]
    depends_on:
      backend:
        condition: service_healthy

volumes:
  pgdata:
